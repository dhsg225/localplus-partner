<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: -apple-system, sans-serif; width: 360px; padding: 14px; color: #111827; }
    h1 { font-size: 13px; font-weight: 700; margin: 0 0 10px; }
    label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; color: #6b7280; margin: 10px 0 4px; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 12px; }
    textarea { min-height: 140px; resize: vertical; font-family: inherit; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    button { width: 100%; margin-top: 8px; padding: 9px; border: none; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }
    #grabSelected { background: #f3f4f6; color: #111827; }
    #autoDetect { background: #f3f4f6; color: #111827; }
    #send { background: #f97316; color: white; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 11px; color: #6b7280; margin-top: 8px; min-height: 14px; }
  </style>
</head>
<body>
  <h1>LocalPlus Event Capture</h1>

  <button id="grabSelected">Grab selected text on this tab</button>
  <button id="autoDetect">Try auto-detect latest post</button>

  <label>Source</label>
  <input id="source" value="Sandy Beach" />

  <div class="row">
    <div>
      <label>Mode</label>
      <select id="mode">
        <option value="terry" selected>Terry Feed (Sandy Beach)</option>
        <option value="facebook">Facebook Dump (Raw AI)</option>
        <option value="ocr">OCR / Photo Scan</option>
        <option value="manual">Manual Scratchpad</option>
      </select>
    </div>
    <div>
      <label>Date</label>
      <input id="date" type="date" />
    </div>
  </div>

  <label>Captured text (edit before sending)</label>
  <textarea id="content" placeholder="Select the post's text on the Facebook tab, then click &quot;Grab selected text&quot; above — or paste manually here."></textarea>

  <button id="send">Send to ingestion dashboard →</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
